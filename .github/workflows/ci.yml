name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: NixOS/nix-installer-action@main

      - run: nix -vL --show-trace flake check

      - run: nix -vL --show-trace build

      - uses: actions/upload-artifact@v7
        with:
          name: zmk_firmware
          path: result

      - name: Instantiate flake template
        run: |
          mkdir ../zmk-config
          cd ../zmk-config
          git init
          nix flake init --template ../zmk-nix
          nix flake lock
          git add .

      - run: nix -vL --show-trace flake check
        working-directory: ../zmk-config

      - run: nix -vL --show-trace build --no-link
        working-directory: ../zmk-config
